# Railway Configuration for Cron Jobs
# This file configures scheduled jobs to run on Railway

# Main API Service (always running)
[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"

# Cron Job: Sync FEC Data (Mon/Wed/Fri at 2 AM UTC)
[[services]]
name = "fec-sync-cron"
cronSchedule = "0 2 * * 1,3,5"  # 2 AM UTC on Monday, Wednesday, Friday
startCommand = "tsx src/jobs/sync-all-data.ts"
restartPolicyType = "NEVER"

# Note: Railway cron jobs run in the same environment as your main service,
# so they will have access to the same environment variables (DATABASE_URL, FEC_API_KEY, etc.)
