name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 8 * * *'   # daily at 08:00 UTC
  workflow_dispatch:

jobs:
  stale:
    name: Mark and close stale issues/PRs
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for 30 days and is now marked stale.
            It will be closed in 7 days if there is no further activity.
          stale-pr-message: >
            This pull request has been inactive for 30 days and is now marked stale.
            It will be closed in 7 days if there is no further activity.
          close-issue-message: >
            Closing this issue due to prolonged inactivity.
            Feel free to re-open if it is still relevant.
          close-pr-message: >
            Closing this pull request due to prolonged inactivity.
            Feel free to re-open if the work is still in progress.
          days-before-stale: 30
          days-before-close: 7
          exempt-issue-labels: 'pinned,security,in-progress'
          exempt-pr-labels: 'pinned,do-not-close,in-progress'
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
