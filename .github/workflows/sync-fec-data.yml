name: Sync FEC Data

on:
  # Run on schedule: Mon/Wed/Fri at 2 AM UTC
  schedule:
    - cron: '0 2 * * 1,3,5'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger FEC Data Sync
        run: |
          echo "🚀 Triggering FEC data sync..."
          echo "API URL: ${{ secrets.API_URL }}"
          
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "x-sync-key: ${{ secrets.SYNC_API_KEY }}" \
            "${{ secrets.API_URL }}/api/sync/all" \
            --max-time 600)
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "Response: $body"
          echo "HTTP Code: $http_code"
          
          if [ "$http_code" -ne 200 ]; then
            echo "❌ Sync failed with HTTP $http_code"
            exit 1
          fi
          
          echo "✅ Sync completed successfully!"

