name: Docker Build & Smoke Test

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build Docker image (load locally for smoke test)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test – health endpoint
        run: |
          docker run -d --name backend-smoke \
            -e DATABASE_URL="postgresql://dummy:dummy@localhost:5432/dummy" \
            -e FEC_API_KEY="dummy" \
            -e GEMINI_API_KEY="dummy" \
            -e NODE_ENV="test" \
            -p 3001:3001 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

          echo "Waiting for container to start..."
          sleep 8

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health || echo "000")
          echo "Health check HTTP status: $HTTP_CODE"

          docker stop backend-smoke || true
          docker rm backend-smoke || true

          # Accept 200 (healthy) or 503 (unhealthy but server is up; DB not connected in CI is expected)
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "503" ]; then
            echo "❌ Smoke test failed – unexpected HTTP status $HTTP_CODE"
            exit 1
          fi
          echo "✅ Smoke test passed (HTTP $HTTP_CODE)"

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
