services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      PORT: "3001"
      NODE_ENV: development
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./CODE
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "5174:80"
